name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app/**'
      - 'Dockerfile'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Run tests
        working-directory: ./app
        run: npm test || echo "No tests yet"

      - name: Build Docker image
        run: docker build -t dockerized-api:test .