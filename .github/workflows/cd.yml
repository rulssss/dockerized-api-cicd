name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login a ECR
        run: |
          aws ecr get-login-password --region sa-east-1 \
          | docker login --username AWS --password-stdin 630968569878.dkr.ecr.sa-east-1.amazonaws.com

      - name: Build imagen Docker
        run: |
          docker build -t dockerized-api .

      - name: Tag imagen
        run: |
          docker tag dockerized-api:latest 630968569878.dkr.ecr.sa-east-1.amazonaws.com/dockerized-api:latest

      - name: Push a ECR
        run: |
          docker push 630968569878.dkr.ecr.sa-east-1.amazonaws.com/dockerized-api:latest

      - name: Forzar nuevo deployment en ECS
        run: |
          aws ecs update-service \
            --cluster TU_CLUSTER \
            --service TU_SERVICE \
            --force-new-deployment